<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planes — Gasifac</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero small">
    <div class="container">
      <a href="/gasifac" class="back-link">← Gasifac</a>
      <h1>Licencia</h1>
    </div>
  </header>

  <main>
    <section class="pricing">
      <div class="container">
        <div class="pricing-grid single">
          <div class="plan-card featured">
            <h3>Gasifac</h3>
            <p class="price">$800 <span>/mes por licencia</span></p>
            <ul>
              <li>Procesamiento masivo de CFDIs</li>
              <li>Un equipo PC por licencia</li>
              <li>Actualizaciones incluidas</li>
              <li>Soporte técnico</li>
            </ul>
            <button class="btn-primary" id="checkout-btn">Suscribirme ahora</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Pagos procesados por Stripe — <a href="/gasifac">Volver al inicio</a></p>
    </div>
  </footer>

  <script src="landing.js"></script>
</body>
</html>
