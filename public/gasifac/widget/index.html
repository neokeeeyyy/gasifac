<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gasifac — Widget</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @font-face {
      font-family: 'Staff X Wide';
      src: url('../fonts/Staff-XWide.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      --bg: #ffffff;
      --bg-alt: #f8f9fa;
      --border: #e5e7eb;
      --text: #111827;
      --text-sec: #6b7280;
      --text-muted: #9ca3af;
      --accent: #ea580c;
      --font-display: 'Staff X Wide', 'Arial Black', sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg-alt);
      font-family: var(--font-body);
    }
    .widget {
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .widget-header {
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      padding: 20px 20px 16px;
    }
    .widget-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .widget-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .widget-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .widget-logo-icon i { color: white; font-size: 0.85rem; }
    .widget-logo-text {
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-family: var(--font-display);
    }
    .widget-badge {
      font-size: 0.7rem;
      background: rgba(234, 88, 12, 0.2);
      color: #fb923c;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }
    .widget-period {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .widget-period-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .widget-period-value {
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .widget-body {
      padding: 20px;
    }
    .widget-empty {
      text-align: center;
      padding: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .widget-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .widget-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .widget-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <div class="widget-header-top">
        <a href="/gasifac" class="widget-logo" target="_blank">
          <div class="widget-logo-icon"><i class="fa-solid fa-fire"></i></div>
            <span class="widget-logo-text">Gasifac</span>
        </a>
        <span class="widget-badge">CRE</span>
      </div>
      <div class="widget-period">
        <div class="widget-period-label">Periodo vigente</div>
        <div class="widget-period-value" id="periodo">Cargando...</div>
      </div>
    </div>
    <div class="widget-body">
      <div class="widget-empty">Próximamente: consulta de precios por municipio</div>
    </div>
    <div class="widget-footer">
      <span>Datos oficiales CRE</span>
      <a href="https://neokey.dev/gasifac" target="_blank">neokey.dev</a>
    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
