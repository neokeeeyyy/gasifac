<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GASIFAC — Precios de gas LP en México</title>
  <meta name="description" content="Consulta los precios máximos de gas LP por municipio en México. Datos oficiales de la CRE, actualizados semanalmente." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="common.css" />
  <style>
    .hero {
      padding: 80px 0 60px;
      text-align: center;
      background: linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-sec);
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .hero-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.15;
      margin-bottom: 16px;
      color: var(--text);
    }
    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.15rem);
      color: var(--text-sec);
      max-width: 560px;
      margin: 0 auto 32px auto;
    }
    .cta-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    .platform-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .platform-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }
    .platform-card i {
      font-size: 2.4rem;
      color: var(--text-sec);
      margin-bottom: 14px;
    }
    .platform-card:hover i { color: var(--text); }
    .platform-card .platform-name {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    @media (max-width: 768px) {
      .cta-row { flex-direction: column; align-items: center; }
      .cta-row .btn { width: 100%; max-width: 280px; text-align: center; }
      .platform-grid { grid-template-columns: 1fr; max-width: 280px; }
    }
  </style>
</head>
<body>

  <main class="container">
    <section class="hero" id="inicio">
      <div class="hero-badge fade-up">
        <i class="fa-solid fa-bolt"></i>
        Actualizado semanalmente
      </div>
      <h1 class="hero-title fade-up">Consulta los precios<br>máximos de gas LP</h1>
      <p class="hero-sub fade-up">Datos oficiales de la CRE por municipio, actualizados cada semana.</p>
      <div class="cta-row fade-up">
        <a href="/gasifac/herramientas" class="btn btn-primary">Consultar Precios</a>
        <a href="/gasifac/nosotros" class="btn btn-outline">Conocer Más</a>
      </div>
    </section>

    <div class="divider" id="plataformas">
      <div class="divider-line"></div>
      <h2 class="divider-label">Plataformas</h2>
    </div>

    <section class="fade-up" style="padding-bottom:80px;">
      <div class="platform-grid">
        <div class="platform-card">
          <i class="fa-brands fa-linux"></i>
          <span class="platform-name">Linux</span>
        </div>
        <div class="platform-card">
          <i class="fa-brands fa-apple"></i>
          <span class="platform-name">macOS</span>
        </div>
        <div class="platform-card">
          <i class="fa-brands fa-windows"></i>
          <span class="platform-name">Windows</span>
        </div>
      </div>
    </section>
  </main>

  <script src="components.js"></script>
  <script>injectNavbar("inicio"); injectFooter();</script>
</body>
</html>
